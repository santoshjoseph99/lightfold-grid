name: Alpha Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-alpha.*"

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: package:linux
          - os: macos-latest
            command: package:mac
          - os: windows-latest
            command: package:win
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:validate
      - run: npm run native:smoke
      - run: npm run alpha:readiness
      - run: npm test
      - run: npm run test:integration
      - run: npm run ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/*.tar.gz
            release/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: release
          merge-multiple: true
      - run: node scripts/generate-release-metadata.mjs
      - run: gh release create "$GITHUB_REF_NAME" release/* --generate-notes --prerelease --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
