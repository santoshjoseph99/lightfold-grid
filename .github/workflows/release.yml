name: Alpha Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-alpha.*"

permissions:
  contents: read

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: package:linux
            signingPlatform: ""
          - os: macos-latest
            command: package:mac
            signingPlatform: mac
          - os: windows-latest
            command: package:win
            signingPlatform: win
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run release:validate
      - run: npm run native:smoke
      - run: npm run alpha:readiness
      - run: npm run community:readiness
      - run: npm run release:signing-readiness
      - run: npm test
      - run: npm run benchmark:live:contract
      - run: npm run test:integration
      - if: startsWith(github.ref, 'refs/tags/') && matrix.signingPlatform != ''
        run: npm run release:signing-readiness -- --require-credentials ${{ matrix.signingPlatform }}
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - run: npm run ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || 'false' }}
          CSC_LINK: ${{ matrix.signingPlatform == 'mac' && secrets.MAC_CSC_LINK || matrix.signingPlatform == 'win' && secrets.WIN_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.signingPlatform == 'mac' && secrets.MAC_CSC_KEY_PASSWORD || matrix.signingPlatform == 'win' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.os }}
          path: |
            release/*.AppImage
            release/*.dmg
            release/*.exe
            release/*.tar.gz
            release/*.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: packages-*
          path: release
          merge-multiple: true
      - run: node scripts/generate-release-metadata.mjs
      - run: gh release create "$GITHUB_REF_NAME" release/* --generate-notes --prerelease --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
