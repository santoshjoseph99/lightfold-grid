name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run native:smoke
      - run: npm run alpha:readiness
      - run: npm run community:readiness
      - run: npm run release:signing-readiness
      - run: npm run github:readiness
      - run: npm test
      - run: npm run benchmark:reference
      - run: npm run benchmark:live:contract
      - run: git diff --exit-code -- benchmark-results
      - run: npm run test:integration
      - run: npm run build
      - run: npm audit --audit-level=high
