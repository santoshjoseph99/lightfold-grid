name: Bug report
description: Report a reproducible Lightfold Grid defect
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove credentials, private prompts, proprietary
        code, and other sensitive data before submitting.
  - type: checkboxes
    attributes:
      label: Safety check
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: This report contains no secrets or private repository content.
          required: true
        - label: This is not a vulnerability report.
          required: true
  - type: input
    attributes:
      label: Version or commit
      placeholder: 0.1.0-alpha.1 or commit SHA
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (unsupported)
        - Other
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe reproduction you can.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    attributes:
      label: Redacted diagnostics
      description: Include only data you have reviewed and safely redacted.
